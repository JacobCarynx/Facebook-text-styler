<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Text Styler Pro</title>
    <!-- Google Fonts Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090d16;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-gradient: linear-gradient(135deg, #1877f2 0%, #a855f7 100%);
            --accent-solid: #1877f2;
            --accent-glow: rgba(24, 119, 242, 0.3);
            --card-hover: rgba(24, 119, 242, 0.08);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --card-bg: rgba(255, 255, 255, 0.02);
            --input-bg: rgba(15, 23, 42, 0.6);
            --toast-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --panel-border: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-gradient: linear-gradient(135deg, #1877f2 0%, #6366f1 100%);
            --accent-solid: #1877f2;
            --accent-glow: rgba(24, 119, 242, 0.15);
            --card-hover: rgba(24, 119, 242, 0.05);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
            --card-bg: rgba(0, 0, 0, 0.02);
            --input-bg: rgba(255, 255, 255, 0.9);
            --toast-success: linear-gradient(135deg, #059669 0%, #047857 100%);
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        /* Header Style */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 20px;
        }

        .logo-section h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-section p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .theme-toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .theme-toggle-btn:hover {
            border-color: var(--accent-solid);
            background: var(--card-hover);
        }

        /* Layout Grid */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Editor Section */
        .editor-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            color: var(--text-main);
            padding: 18px;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-solid);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .counter-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: -5px;
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-weight: 500;
            padding: 0;
            font-size: 0.85rem;
        }

        .clear-btn:hover {
            text-decoration: underline;
        }

        /* Modifier Options */
        .modifiers-panel {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px;
        }

        .modifiers-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .modifiers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .mod-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            user-select: none;
        }

        .mod-checkbox input {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--input-bg);
            flex-shrink: 0;
        }

        .mod-checkbox input:checked + .custom-checkbox {
            background: var(--accent-gradient);
            border-color: transparent;
        }

        .mod-checkbox input:checked + .custom-checkbox::after {
            content: "";
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Output / Preview Section */
        .preview-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-bar-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            color: var(--text-main);
            padding: 12px 16px 12px 40px;
            font-size: 0.95rem;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent-solid);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .styles-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Custom Scrollbar */
        .styles-grid::-webkit-scrollbar {
            width: 6px;
        }
        .styles-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        .styles-grid::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 10px;
        }
        .styles-grid::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Styled Cards */
        .style-card {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .style-card:hover {
            border-color: var(--accent-solid);
            background: var(--card-hover);
        }

        .card-details {
            flex-grow: 1;
            min-width: 0;
        }

        .card-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .style-badge {
            background: var(--panel-border);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-preview {
            font-size: 1.25rem;
            font-weight: 500;
            word-wrap: break-word;
            white-space: pre-wrap;
            color: var(--text-main);
        }

        .copy-btn {
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px var(--accent-glow);
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px var(--accent-glow);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: -60px;
            right: 24px;
            background: var(--toast-success);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            opacity: 0;
        }
        .toast.show {
            bottom: 24px;
            opacity: 1;
        }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <div class="header">
        <div class="logo-section">
            <h1>FB Text Styler Pro</h1>
            <p>Générez du texte stylé pour Facebook, Instagram & Bios !</p>
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="theme-icon"></span> <span id="theme-text">Mode Clair</span>
        </button>
    </div>

    <div class="layout-grid">
        <!-- Editor Left Column -->
        <div class="editor-section">
            <div class="input-group">
                <div class="counter-row">
                    <label for="input">Votre texte :</label>
                    <button class="clear-btn" onclick="clearInput()">Effacer tout</button>
                </div>
                <textarea id="input" placeholder="Écrivez quelque chose ici... (ex: Mustang 1965 )"></textarea>
                <div class="counter-row" style="margin-top: 5px;">
                    <span id="char-count">0 caractères</span>
                    <span id="word-count">0 mots</span>
                </div>
            </div>

            <!-- Modifiers Panel -->
            <div class="modifiers-panel">
                <h3>Effets cumulatifs globaux</h3>
                <div class="modifiers-grid">
                    <label class="mod-checkbox">
                        <input type="checkbox" id="mod-underline" onchange="updateOutputs()">
                        <div class="custom-checkbox"></div>
                        <span>Souligné</span>
                    </label>
                    <label class="mod-checkbox">
                        <input type="checkbox" id="mod-dblunderline" onchange="updateOutputs()">
                        <div class="custom-checkbox"></div>
                        <span>Double souligné</span>
                    </label>
                    <label class="mod-checkbox">
                        <input type="checkbox" id="mod-strikethrough" onchange="updateOutputs()">
                        <div class="custom-checkbox"></div>
                        <span>Barré</span>
                    </label>
                    <label class="mod-checkbox">
                        <input type="checkbox" id="mod-slashthrough" onchange="updateOutputs()">
                        <div class="custom-checkbox"></div>
                        <span>Tranché (slash)</span>
                    </label>
                    <label class="mod-checkbox" style="grid-column: span 2;">
                        <input type="checkbox" id="mod-sparkles" onchange="updateOutputs()">
                        <div class="custom-checkbox"></div>
                        <span>Décorer avec des étincelles (✨)</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Preview/Cards Right Column -->
        <div class="preview-section">
            <div class="search-bar-container">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search" class="search-input" placeholder="Rechercher un style (ex: gothic, bold, script...)" oninput="filterStyles()">
            </div>

            <div id="styles-container" class="styles-grid">
                <!-- Cards will render here dynamically -->
            </div>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('input');
    const search = document.getElementById('search');
    const stylesContainer = document.getElementById('styles-container');

    // Premium unicode mathematical style definitions
    const styleDefinitions = [
        { name: "Gras (Bold Serif)", desc: "Math Bold Serif", badge: "Gras", key: "serifBold" },
        { name: "Italique (Italic Serif)", desc: "Math Italic Serif", badge: "Italique", key: "serifItalic" },
        { name: "Gras & Italique (Bold Italic)", desc: "Math Bold Italic Serif", badge: "Gras + Italique", key: "serifBoldItalic" },
        { name: "Sans-Serif Gras", desc: "Math Sans Bold", badge: "Moderne", key: "sansSerifBold" },
        { name: "Sans-Serif Italique", desc: "Math Sans Italic", badge: "Fluide", key: "sansSerifItalic" },
        { name: "Calligraphie (Script)", desc: "Math Script Cursive", badge: "Élégant", key: "script" },
        { name: "Calligraphie Grasse (Script Bold)", desc: "Math Bold Script Cursive", badge: "Artistique", key: "calligraphieGrasse" },
        { name: "Gothique (Fraktur)", desc: "Math Gothic Fraktur", badge: "Classique", key: "gothic" },
        { name: "Gothique Gras (Gothic Bold)", desc: "Math Gothic Bold", badge: "Puissant", key: "gothicBold" },
        { name: "Double Barre (Blackboard Bold)", desc: "Math Blackboard Bold", badge: "Original", key: "doubleBarre" },
        { name: "Chasse Fixe (Monospace)", desc: "Teletype Machine font", badge: "Code", key: "monospace" },
        { name: "Bulles (Circled)", desc: "Enclosed Circled letters", badge: "Fun", key: "circled" },
        { name: "Petites Majuscules (Small Caps)", desc: "Mini Caps typography", badge: "Style", key: "smallCaps" },
        { name: "À l'Envers (Upside Down)", desc: "Flipped reversed", badge: "Insolite", type: "upside" },
        { name: "Effet Miroir (Mirror)", desc: "Backwards typography", badge: "Fun", type: "mirror" }
    ];

    // Mathematical Unicode ranges
    const RANGE_MAPS = {
        sansSerifBold: { upperStart: 0x1D5D4, lowerStart: 0x1D5EE },
        serifBold: { upperStart: 0x1D400, lowerStart: 0x1D41A },
        sansSerifItalic: { upperStart: 0x1D608, lowerStart: 0x1D622 },
        serifItalic: { upperStart: 0x1D434, lowerStart: 0x1D44E },
        sansSerifBoldItalic: { upperStart: 0x1D63C, lowerStart: 0x1D656 },
        serifBoldItalic: { upperStart: 0x1D468, lowerStart: 0x1D482 },
        script: { upperStart: 0x1D49C, lowerStart: 0x1D4B6 },
        calligraphieGrasse: { upperStart: 0x1D4D0, lowerStart: 0x1D4EA },
        doubleBarre: { upperStart: 0x1D538, lowerStart: 0x1D552 },
        circled: { upperStart: 0x24B6, lowerStart: 0x24D0 },
        gothic: { upperStart: 0x1D504, lowerStart: 0x1D51E },
        gothicBold: { upperStart: 0x1D56C, lowerStart: 0x1D586 },
        monospace: { upperStart: 0x1D670, lowerStart: 0x1D68A }
    };

    // Special Unicode exceptions due to gaps in Mathematical Alphanumeric block (defined in Letterlike Symbols)
    const UNICODE_EXCEPTIONS = {
        serifItalic: {
            104: 0x210E  // h -> ℎ (Planck constant)
        },
        script: {
            66: 0x212C,  // B -> ℬ
            69: 0x2130,  // E -> ℰ
            70: 0x2131,  // F -> ℱ
            72: 0x210B,  // H -> ℋ
            73: 0x2110,  // I -> ℐ
            76: 0x2112,  // L -> ℒ
            77: 0x2113,  // M -> ℳ
            82: 0x211B,  // R -> ℛ
            101: 0x212F, // e -> ℯ
            103: 0x210A, // g -> ℊ
            111: 0x2134  // o -> ℴ
        },
        doubleBarre: {
            67: 0x2102,  // C -> ℂ
            72: 0x210D,  // H -> ℍ
            78: 0x2115,  // N -> ℕ
            80: 0x2119,  // P -> ℙ
            81: 0x211A,  // Q -> ℚ
            82: 0x211D,  // R -> ℝ
            90: 0x2124   // Z -> ℤ
        },
        gothic: {
            67: 0x212D,  // C -> ℭ
            72: 0x210C,  // H -> ℌ
            73: 0x2111,  // I -> ℑ
            82: 0x211C,  // R -> ℜ
            90: 0x2128   // Z -> ℨ
        }
    };

    // Small Caps lookup map
    const smallCapsMap = {
        'a':'ᴀ','b':'ʙ','c':'ᴄ','d':'ᴅ','e':'ᴇ','f':'ꜰ','g':'ɢ','h':'ʜ','i':'ɪ','j':'ᴊ','k':'ᴋ','l':'ʟ','m':'ᴍ','n':'ɴ','o':'ᴏ','p':'ᴘ','q':'ǫ','r':'ʀ','s':'s','t':'ᴛ','u':'ᴜ','v':'ᴠ','w':'ᴡ','x':'x','y':'ʏ','z':'ᴢ',
        'A':'ᴀ','B':'ʙ','C':'ᴄ','D':'ᴅ','E':'ᴇ','F':'ꜰ','G':'ɢ','H':'ʜ','I':'ɪ','J':'ᴊ','K':'ᴋ','L':'ʟ','M':'ᴍ','N':'ɴ','O':'ᴏ','P':'ᴘ','Q':'ǫ','R':'ʀ','S':'s','T':'ᴛ','U':'ᴜ','V':'ᴠ','W':'ᴡ','X':'x','Y':'ʏ','Z':'ᴢ'
    };

    // Upside down translation map
    const upsideDownMap = {
        "a":"ɐ","b":"q","c":"ɔ","d":"p","e":"ǝ","f":"ɟ","g":"ƃ","h":"ɥ","i":"ᴉ","j":"ɾ","k":"ʞ","l":"l","m":"ɯ","n":"u","o":"o","p":"d","q":"b","r":"ɹ","s":"s","t":"ʇ","u":"n","v":"ʌ","w":"ʍ","x":"x","y":"ʎ","z":"z",
        "A":"∀","B":"ᗺ","C":"Ɔ","D":"◖","E":"Ǝ","F":"Ⅎ","G":"⅁","H":"H","I":"I","J":"Ր","K":"ʞ","L":"˥","M":"W","N":"N","O":"O","P":"Ԁ","Q":"Ό","R":"ᴚ","S":"S","T":"⊥","U":"∩","V":"Λ","W":"M","X":"X","Y":"⅄","Z":"Z",
        "0":"0","1":"Ɩ","2":"ᄅ","3":"Ɛ","4":"ㄣ","5":"ϛ","6":"9","7":"ㄥ","8":"8","9":"6"
    };

    // Mirror translation map
    const mirrorMap = {
        "a":"ɒ","b":"d","c":"ɔ","d":"b","e":"ɘ","f":"ʇ","g":"ϱ","h":"ʜ","i":"i","j":"ᓀ","k":"ʞ","l":"l","m":"m","n":"ᴎ","o":"o","p":"q","q":"p","r":"ᴙ","s":"ꙅ","t":"ʇ","u":"u","v":"v","w":"w","x":"x","y":"γ","z":"ƹ",
        "A":"A","B":"ᙏ","C":"Ɔ","D":"Ɑ","E":"Ǝ","F":"ᆡ","G":"Ꭾ","H":"H","I":"I","J":"ᓀ","K":"K","L":"⅃","M":"M","N":"И","O":"O","P":"ꟼ","Q":"Ϙ","R":"ᴙ","S":"Ꙅ","T":"T","U":"U","V":"V","W":"W","X":"X","Y":"Y","Z":"Z"
    };

    // Initialize Card Layout
    function buildCards() {
        stylesContainer.innerHTML = "";
        styleDefinitions.forEach((style, index) => {
            const card = document.createElement('div');
            card.className = 'style-card';
            card.setAttribute('data-name', style.name.toLowerCase() + " " + style.desc.toLowerCase() + " " + style.badge.toLowerCase());
            card.id = `style-card-${index}`;

            card.innerHTML = `
                <div class="card-details">
                    <div class="card-title-row">
                        <span class="card-title">${style.name}</span>
                        <span class="style-badge">${style.badge}</span>
                    </div>
                    <div class="card-preview" id="preview-${index}">-</div>
                </div>
                <button class="copy-btn" onclick="copyCardText(${index})">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copier
                </button>
            `;
            stylesContainer.appendChild(card);
        });
        updateOutputs();
    }

    // Convert string based on selected mapping or algorithm
    function transformText(text, style) {
        if (!text) return "Écrɪvez dans le champ... ";

        let result = "";

        if (style.type === "upside") {
            // Upside Down logic
            let flipped = "";
            for (let char of text) {
                flipped += upsideDownMap[char] || char;
            }
            result = Array.from(flipped).reverse().join("");
        } else if (style.type === "mirror") {
            // Mirror logic
            let mirrored = "";
            for (let char of text) {
                mirrored += mirrorMap[char] || char;
            }
            result = Array.from(mirrored).reverse().join("");
        } else if (style.key === "smallCaps") {
            // Small Caps logic
            for (let char of text) {
                result += smallCapsMap[char] || char;
            }
        } else if (style.key && RANGE_MAPS[style.key]) {
            // Flawless, mathematical Unicode mapping engine with Letterlike Symbol exceptions integrated
            const { upperStart, lowerStart } = RANGE_MAPS[style.key];
            const exceptions = UNICODE_EXCEPTIONS[style.key] || {};
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const code = char.charCodeAt(0);
                let mappedChar = char;
                
                if (exceptions[code]) {
                    mappedChar = String.fromCodePoint(exceptions[code]);
                } else if (code >= 97 && code <= 122) {
                    mappedChar = String.fromCodePoint(lowerStart + (code - 97));
                } else if (code >= 65 && code <= 90) {
                    mappedChar = String.fromCodePoint(upperStart + (code - 65));
                }
                result += mappedChar;
            }
        } else {
            result = text;
        }

        // Apply cumulative decorators
        const underline = document.getElementById('mod-underline').checked;
        const dblUnderline = document.getElementById('mod-dblunderline').checked;
        const strike = document.getElementById('mod-strikethrough').checked;
        const slash = document.getElementById('mod-slashthrough').checked;
        const sparkles = document.getElementById('mod-sparkles').checked;

        let modified = "";
        for (let char of result) {
            modified += char;
            if (underline) modified += "\u0332";
            if (dblUnderline) modified += "\u0333";
            if (strike) modified += "\u0336";
            if (slash) modified += "\u0337";
        }

        if (sparkles && text.trim().length > 0) {
            modified = `✨ ${modified} ✨`;
        }

        return modified;
    }

    // Main real-time update engine
    function updateOutputs() {
        const textValue = input.value;
        
        // Counter statistics
        document.getElementById('char-count').innerText = `${textValue.length} caractères`;
        document.getElementById('word-count').innerText = `${textValue.trim() === "" ? 0 : textValue.trim().split(/\s+/).length} mots`;

        styleDefinitions.forEach((style, index) => {
            const previewEl = document.getElementById(`preview-${index}`);
            if (previewEl) {
                previewEl.innerText = transformText(textValue, style);
            }
        });
    }

    function clearInput() {
        input.value = "";
        updateOutputs();
        input.focus();
    }

    // Filter styles through Search
    function filterStyles() {
        const query = search.value.toLowerCase();
        const cards = document.querySelectorAll('.style-card');
        
        cards.forEach(card => {
            const keys = card.getAttribute('data-name');
            if (keys.includes(query)) {
                card.style.display = "flex";
            } else {
                card.style.display = "none";
            }
        });
    }

    // Copy exact text to clipboard & show premium toast notification
    function copyCardText(index) {
        const textValue = input.value;
        const styledText = transformText(textValue, styleDefinitions[index]);
        
        navigator.clipboard.writeText(styledText).then(() => {
            showToast(`Style "${styleDefinitions[index].name}" copié ! `);
        });
    }

    // Create a sleek modern toast notification
    function showToast(message) {
        let toast = document.querySelector('.toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast';
            document.body.appendChild(toast);
        }
        
        toast.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>${message}</span>
        `;
        
        // Restart slide animation
        toast.classList.remove('show');
        void toast.offsetWidth; // Force reflow
        toast.classList.add('show');

        // Hide after 2.5 seconds
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // Premium Theme toggler (Light Mode vs Dark Mode)
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        const text = document.getElementById('theme-text');
        
        if (body.getAttribute('data-theme') === "dark") {
            body.setAttribute('data-theme', "light");
            icon.innerText = "";
            text.innerText = "Mode Sombre";
        } else {
            body.setAttribute('data-theme', "dark");
            icon.innerText = "";
            text.innerText = "Mode Clair";
        }
    }

    // Listeners and auto-focus initialization
    input.addEventListener('input', updateOutputs);
    window.onload = () => {
        buildCards();
        input.focus();
    };
</script>

</body>
</html>
