<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Text Styler Pro</title>
    <!-- Google Fonts Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090d16;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-gradient: linear-gradient(135deg, #1877f2 0%, #a855f7 100%);
            --accent-solid: #1877f2;
            --accent-glow: rgba(24, 119, 242, 0.3);
            --card-hover: rgba(24, 119, 242, 0.08);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --card-bg: rgba(255, 255, 255, 0.02);
            --input-bg: rgba(15, 23, 42, 0.6);
            --toast-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --panel-border: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-gradient: linear-gradient(135deg, #1877f2 0%, #6366f1 100%);
            --accent-solid: #1877f2;
            --accent-glow: rgba(24, 119, 242, 0.15);
            --card-hover: rgba(24, 119, 242, 0.05);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
            --card-bg: rgba(0, 0, 0, 0.02);
            --input-bg: rgba(255, 255, 255, 0.9);
            --toast-success: linear-gradient(135deg, #059669 0%, #047857 100%);
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        /* Header Style */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 20px;
        }

        .logo-section h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-section p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .theme-toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .theme-toggle-btn:hover {
            border-color: var(--accent-solid);
            background: var(--card-hover);
        }

        /* Layout Grid */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Editor Section */
        .editor-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            color: var(--text-main);
            padding: 18px;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-solid);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .counter-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: -5px;
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-weight: 500;
            padding: 0;
            font-size: 0.85rem;
        }

        .clear-btn:hover {
            text-decoration: underline;
        }

        /* Modifier Options */
        .modifiers-panel {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px;
        }

        .modifiers-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .modifiers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .mod-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            user-select: none;
        }

        .mod-checkbox input {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--input-bg);
            flex-shrink: 0;
        }

        .mod-checkbox input:checked + .custom-checkbox {
            background: var(--accent-gradient);
            border-color: transparent;
        }

        .mod-checkbox input:checked + .custom-checkbox::after {
            content: "вң“";
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Output / Preview Section */
        .preview-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-bar-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            color: var(--text-main);
            padding: 12px 16px 12px 40px;
            font-size: 0.95rem;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent-solid);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .styles-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Custom Scrollbar */
        .styles-grid::-webkit-scrollbar {
            width: 6px;
        }
        .styles-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        .styles-grid::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 10px;
        }
        .styles-grid::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Styled Cards */
        .style-card {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .style-card:hover {
            border-color: var(--accent-solid);
            background: var(--card-hover);
        }

        .card-details {
            flex-grow: 1;
            min-width: 0;
        }

        .card-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .style-badge {
            background: var(--panel-border);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-preview {
            font-size: 1.25rem;
            font-weight: 500;
            word-wrap: break-word;
            white-space: pre-wrap;
            color: var(--text-main);
        }

        .copy-btn {
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px var(--accent-glow);
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px var(--accent-glow);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: -60px;
            right: 24px;
            background: var(--toast-success);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            opacity: 0;
        }
        .toast.show {
            bottom: 24px;
            opacity: 1;
        }
    </style>
</head>

            <div id="styles-container" class="styles-grid">
                <!-- Cards will render here dynamically -->
            </div>
        </div>
    </div>
</div>

        styleDefinitions[6].map = Array.from(" canрқ“ рқ“җрқ“‘рқ“’рқ““рқ“”рқ“•рқ“–рқ“—рқ“ҳрқ“ҷрқ“ҡрқ“ӣрқ“ңрқ“қрқ“һрқ“ҹрқ“ рқ“Ўрқ“ўрқ“Јрқ“Өрқ“Ҙрқ“Ұрқ“§рқ“Ёрқ“©рқ“Әрқ“«рқ“¬рқ“ӯрқ“®рқ“Ҝрқ“°рқ“ұрқ“Ірқ“ірқ“ҙрқ“өрқ“¶рқ“·рқ“ёрқ“№рқ“әрқ“»рқ“ј|рқ“ҫрқ“ҝрқ”Җрқ“Қрқ”Ӯрқ“Ҹ0123456789".replace(" canрқ“ ", "рқ“ ").replace("|", "рқ“Ҫ").replace("рҹҮ®рҹҮ©", ""));
        styleDefinitions[8].map = Array.from("рқ•¬рқ•ӯрқ•®рқ•Ҝрқ•°рқ•ұрқ•Ірқ•ірқ•ҙрқ•өрқ•¶рқ•·рқ•ёрқ•№рқ•әрқ•»рқ•јрқ•Ҫрқ•ҫрқ•ҝрқ–Җрқ–Ғрқ–Ӯрқ–ғрқ–„рқ–…рқ–Ҷрқ–Үрқ–Ҳрқ–үрқ–Ҡрқ–Ӣрқ–Ңрқ–Қрқ–Һрқ–Ҹрқ–җрқ–‘рқ–’рқ–“рқ–”рқ–•рқ––рқ–—рқ–ҳ|рқ–ҡрқ–ӣрқ–ңрқ–қрқ–һрқ–ҹ0123456789".replace("|", "рқ–ҷ").replace("рҹҮ®рҹҮӘ", ""));

        styleDefinitions[11].map = Array.from("в’¶в’·в’ёв’№в’әв’»в’јв’Ҫв’ҫв’ҝв“Җв“Ғв“Ӯв“ғв“„в“…в“Ҷв“Үв“Ҳв“үв“Ҡв“Ӣв“Ңв“Қв“Һв“Ҹв“җв“‘в“’в““в“”в“•в“–в“—в“ҳв“ҷв“ҡв“ӣв“ңв“қcontainedв“ҹв“ в“Ўв“ўв“Јв“Өв“Ҙв“Ұв“§в“Ёв“©в“Әв‘ в‘Ўв‘ўв‘Јв‘Өв‘Ҙв‘Ұв‘§в‘Ё".replace("contained", ""));
        styleDefinitions[12].map = Array.from("бҙҖКҷбҙ„бҙ…бҙҮкң°ЙўКңЙӘбҙҠбҙӢКҹбҙҚЙҙбҙҸбҙҳЗ«КҖsбҙӣбҙңбҙ бҙЎxКҸбҙўбҙҖКҷбҙ„е®Ңж•ҙбҙҚЙҙбҙҸбҙҳЗ«КҖsбҙӣбҙңбҙ бҙЎxКҸбҙў0123456789".replace("бҙҖКҷбҙ„е®Ңж•ҙ", "бҙҖКҷбҙ„бҙ…бҙҮкң°ЙўКңЙӘбҙҠбҙӢКҹ"));
    };
    cleanStyles();

    // Upside down translation map
    const upsideDownMap = {
        "a":"Йҗ","b":"q","c":"Й”","d":"p","e":"Зқ","f":"Йҹ","g":"Жғ","h":"ЙҘ","i":"бҙү","j":"Йҫ","k":"Кһ","l":"l","m":"ЙҜ","n":"u","o":"o","p":"d","q":"b","r":"Й№","s":"s","t":"КҮ","u":"n","v":"КҢ","w":"КҚ","x":"x","y":"КҺ","z":"z",
        "A":"вҲҖ","B":"рҗҗ’","C":"ЖҶ","D":"в—–","E":"ЖҺ","F":"в„І","G":"в…Ғ","H":"H","I":"I","J":"Хҗ","K":"Кһ","L":"ЛҘ","M":"W","N":"N","O":"O","P":"ФҖ","Q":"ОҢ","R":"бҙҡ","S":"S","T":"в”ҙ","U":"вҲ©","V":"Оӣ","W":"M","X":"X","Y":"в…„","Z":"Z",
        "0":"0","1":"Ж–","2":"б„…","3":"Жҗ","4":"г„Ј","5":"Пӣ","6":"9","7":"г„Ҙ","8":"8","9":"6"

    // Mirror translation map
    const mirrorMap = {
        "a":"Й’","b":"d","c":"Й”","d":"b","e":"Йҳ","f":"КҮ","g":"Пұ","h":"Кң","i":"i","j":"б“Җ","k":"Кһ","l":"l","m":"m","n":"бҙҺ","o":"o","p":"q","q":"p","r":"бҙҷ","s":"кҷ…","t":"КҮ","u":"u","v":"v","w":"w","x":"x","y":"Оі","z":"Ж№",
        "A":"A","B":"бҷҸ","C":"ЖҶ","D":"вұӯ","E":"ЖҺ","F":"бҶЎ","G":"бҺ®","H":"H","I":"I","J":"б“Җ","K":"к“ҳ","L":"в…ғ","M":"M","N":"Рҳ","O":"O","P":"кҹј","Q":"Пҳ","R":"бҙҷ","S":"кҷ„","T":"T","U":"U","V":"V","W":"W","X":"X","Y":"Y","Z":"рқ–№"

    // Initialize Card Layout
    function buildCards() {
        stylesContainer.innerHTML = "";
        styleDefinitions.forEach((style, index) => {
            const card = document.createElement('div');
            card.className = 'style-card';
            card.setAttribute('data-name', style.name.toLowerCase() + " " + style.desc.toLowerCase() + " " + style.badge.toLowerCase());
            card.id = `style-card-${index}`;

            card.innerHTML = `
                <div class="card-details">
                    <div class="card-title-row">
                        <span class="card-title">${style.name}</span>
                        <span class="style-badge">${style.badge}</span>
                    </div>
                    <div class="card-preview" id="preview-${index}">-</div>
                </div>
                <button class="copy-btn" onclick="copyCardText(${index})">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copier
                </button>
            `;
            stylesContainer.appendChild(card);
        });
        updateOutputs();
    }

    // Convert string based on selected mapping or algorithm
    function transformText(text, style) {
        if (!text) return "ГүcrЙӘvez dans le champ... вңЁ";

        let result = "";

        if (style.type === "upside") {
            // Upside Down logic
            let flipped = "";
            for (let char of text) {
                flipped += upsideDownMap[char] || char;
            }
            result = Array.from(flipped).reverse().join("");
        } else if (style.type === "mirror") {
            // Mirror logic
            let mirrored = "";
            for (let char of text) {
                mirrored += mirrorMap[char] || char;
            }
            result = Array.from(mirrored).reverse().join("");
        } else if (style.map) {
            // Substitution logic
            for (let char of text) {
                let idx = std.indexOf(char);
                result += idx !== -1 ? style.map[idx] : char;
            }
        } else {
            result = text;
        }

        // Apply cumulative decorators
        const underline = document.getElementById('mod-underline').checked;
        const dblUnderline = document.getElementById('mod-dblunderline').checked;
        const strike = document.getElementById('mod-strikethrough').checked;
        const slash = document.getElementById('mod-slashthrough').checked;
        const sparkles = document.getElementById('mod-sparkles').checked;

        let modified = "";
        for (let char of result) {
            modified += char;
            if (underline) modified += "\u0332";
            if (dblUnderline) modified += "\u0333";
            if (strike) modified += "\u0336";
            if (slash) modified += "\u0337";
        }

        if (sparkles && text.trim().length > 0) {
            modified = `вңЁ ${modified} вңЁ`;
        }

        return modified;
    }

    // Main real-time update engine
    function updateOutputs() {
        const textValue = input.value;
        
        // Counter statistics
        document.getElementById('char-count').innerText = `${textValue.length} caractГЁres`;
        document.getElementById('word-count').innerText = `${textValue.trim() === "" ? 0 : textValue.trim().split(/\s+/).length} mots`;

        styleDefinitions.forEach((style, index) => {
            const previewEl = document.getElementById(`preview-${index}`);
            if (previewEl) {
                previewEl.innerText = transformText(textValue, style);
            }
        });
    }

    // Clear Textarea input
    function clearInput() {
        input.value = "";
        updateOutputs();
        input.focus();
    }

    // Filter styles through Search
    function filterStyles() {
        const query = search.value.toLowerCase();
        const cards = document.querySelectorAll('.style-card');
        
        cards.forEach(card => {
            const keys = card.getAttribute('data-name');
            if (keys.includes(query)) {
                card.style.display = "flex";
            } else {
                card.style.display = "none";
            }
        });
    }

    // Copy exact text to clipboard & show premium toast notification
    function copyCardText(index) {
        const textValue = input.value;
        const styledText = transformText(textValue, styleDefinitions[index]);
        
        navigator.clipboard.writeText(styledText).then(() => {
            showToast(`Style "${styleDefinitions[index].name}" copiГ© ! рҹҡҖ`);
        });
    }

    // Create a sleek modern toast notification
    function showToast(message) {
        let toast = document.querySelector('.toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast';
            document.body.appendChild(toast);
        }
        
        toast.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>${message}</span>
        `;
        
        // Restart slide animation
        toast.classList.remove('show');
        void toast.offsetWidth; // Force reflow
        toast.classList.add('show');

        // Hide after 2.5 seconds
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // Premium Theme toggler (Light Mode vs Dark Mode)
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        const text = document.getElementById('theme-text');
        
        if (body.getAttribute('data-theme') === "dark") {
            body.setAttribute('data-theme', "light");
            icon.innerText = "рҹҢҷ";
            text.innerText = "Mode Sombre";
        } else {
            body.setAttribute('data-theme', "dark");
            icon.innerText = "вҳҖпёҸ";
            text.innerText = "Mode Clair";
        }
    }

    // Listeners and auto-focus initialization
    input.addEventListener('input', updateOutputs);
    window.onload = () => {
        buildCards();
        input.focus();
    };
</script>
